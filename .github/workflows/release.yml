name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, for example 1.0.1"
        required: true
        type: string
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $eventName = "${{ github.event_name }}"
          if ($eventName -eq "workflow_dispatch") {
            $version = "${{ github.event.inputs.version }}".Trim()
            if ($version.StartsWith("v")) {
              $version = $version.Substring(1)
            }
            if ($version -notmatch '^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$') {
              throw "Version must look like 1.0.1 or 1.0.1-beta.1"
            }
            $tag = "v$version"
          } else {
            $tag = "${{ github.ref_name }}"
            $version = $tag.TrimStart("v")
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build package and manifest
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $version = "${{ steps.version.outputs.version }}"
          $repo = "${{ github.repository }}"
          $zipName = "resource-search-tool-$version.zip"
          $dist = "dist"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null

          $manifestUrl = "https://github.com/$repo/releases/latest/download/latest.json"
          $config = Get-Content "app-version.json" -Raw | ConvertFrom-Json
          $config.version = $version
          $config.manifest_url = $manifestUrl
          $config | ConvertTo-Json -Depth 10 | Set-Content "app-version.json" -Encoding UTF8

          $files = @(
            "index.html",
            "server.py",
            "launcher.py",
            "start-tool.bat",
            "app-version.json",
            "README.md",
            "SEARCH_SOURCES.md",
            "GITHUB_UPDATE.md",
            "sources/source-registry.json"
          )
          Compress-Archive -Path $files -DestinationPath "$dist/$zipName" -Force
          $sha = (Get-FileHash "$dist/$zipName" -Algorithm SHA256).Hash.ToLower()
          $size = (Get-Item "$dist/$zipName").Length
          $packageUrl = "https://github.com/$repo/releases/download/$tag/$zipName"

          $latest = [ordered]@{
            name = "resource-search-tool"
            version = $version
            channel = "stable"
            package_url = $packageUrl
            sha256 = $sha
            size = $size
            published_at = (Get-Date).ToUniversalTime().ToString("o")
          }
          $latest | ConvertTo-Json -Depth 10 | Set-Content "$dist/latest.json" -Encoding UTF8

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: main
          name: ${{ steps.version.outputs.tag }}
          files: |
            dist/*.zip
            dist/latest.json
          generate_release_notes: true
